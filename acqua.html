<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Segna la Tua Acqua</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;height:100%;
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
background:#f5f5f5;
overflow-x:hidden
}
body{
padding:1vh 1vw;
display:flex;flex-direction:column;
min-height:100vh;min-height:100dvh
}
.header{
text-align:center;
margin-bottom:1vh;
flex-shrink:0
}
.header h1{
font-size:clamp(1.2rem,3.5vw,2.2rem);
font-weight:900;
color:#000;
text-transform:uppercase;
letter-spacing:1px
}
.date-display{
display:flex;
justify-content:center;
gap:clamp(10px,3vw,25px);
font-size:clamp(0.9rem,2vw,1.2rem);
color:#333;
margin-top:0.5vh
}
.date-display span{
font-weight:600
}
.main-container{
display:flex;
gap:clamp(8px,1.5vw,20px);
justify-content:center;
flex:1;
min-height:0;
max-height:85vh
}
.water-card{
flex:1;
border-radius:clamp(12px,2vw,20px);
padding:clamp(10px,2vw,25px) clamp(8px,1.5vw,20px);
text-align:center;
display:flex;flex-direction:column;
overflow:hidden
}
.card-naturale{
background:linear-gradient(180deg,#d6eaf8 0%,#aed6f1 50%,#85c1e9 100%)
}
.card-frizzante{
background:linear-gradient(180deg,#d5f5e3 0%,#abebc6 50%,#82e0aa 100%)
}
.card-title{
font-size:clamp(0.95rem,2.5vw,1.6rem);
font-weight:900;
color:#1a1a1a;
margin-bottom:1vh;
text-transform:uppercase;
flex-shrink:0
}
.bottle-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
min-height:0
}
.bottle-svg{
max-height:100%;
width:auto;
max-width:45vw
}
.count-section{
flex-shrink:0;
margin:1vh 0
}
.totale-label{
font-size:clamp(0.75rem,1.8vw,1rem);
color:#333;
font-weight:700
}
.count-number{
font-size:clamp(3rem,10vw,5.5rem);
font-weight:900;
color:#1a1a1a;
line-height:1;
margin:0.5vh 0
}
.bottiglie-label{
font-size:clamp(0.85rem,2vw,1.3rem);
font-weight:800;
color:#1a1a1a;
text-transform:uppercase
}
.add-button{
width:100%;
padding:clamp(12px,2.5vw,22px);
color:white;
font-size:clamp(0.8rem,2vw,1.1rem);
font-weight:800;
text-transform:uppercase;
border:none;
border-radius:clamp(6px,1vw,12px);
cursor:pointer;
transition:transform 0.12s, opacity 0.2s;
flex-shrink:0;
letter-spacing:0.5px;
margin-top:auto
}
.add-button:active{transform:scale(0.96)}
.btn-naturale{background:#2980b9}
.btn-frizzante{background:#27ae60}
.add-button:hover{opacity:0.88}
#reset-overlay{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
display:none;justify-content:center;align-items:center;
z-index:1000
}
#reset-overlay.show{display:flex}
#reset-box{
background:#fff;border-radius:16px;padding:30px 40px;
text-align:center;max-width:320px;width:85%
}
#reset-box h2{font-size:1.2rem;color:#333;margin-bottom:8px}
#reset-box p{font-size:0.9rem;color:#666;margin-bottom:20px}
#reset-box .btns{display:flex;gap:12px}
#reset-box .btns button{
flex:1;padding:12px;border:none;border-radius:8px;
font-weight:700;font-size:0.95rem;cursor:pointer
}
#btn-confirm{background:#e74c3c;color:#fff}
#btn-cancel{background:#ccc;color:#333}
.header h1{-webkit-user-select:none;user-select:none}
</style>
</head>
<body>

<div id="reset-overlay">
<div id="reset-box">
<h2>Reset contatori?</h2>
<p>Azzera entrambi i contatori a zero.</p>
<div class="btns">
<button id="btn-confirm">Sì, resetta</button>
<button id="btn-cancel">Annulla</button>
</div>
</div>
</div>

<div class="header">
<h1 id="reset-trigger">Segna la Tua Acqua</h1>
<div class="date-display">
<span id="day"></span>
<span id="month"></span>
<span id="year"></span>
</div>
</div>

<div class="main-container">

<div class="water-card card-naturale">
<div class="card-title">Acqua Naturale</div>
<div class="bottle-area">
<svg class="bottle-svg" viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="gBodyN" x1="60" y1="30" x2="60" y2="300" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
<stop offset="30%" stop-color="#eaf6ff"/>
<stop offset="100%" stop-color="#d4eefb"/>
</linearGradient>
<linearGradient id="gWaterN" x1="60" y1="100" x2="60" y2="290" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#e8f4fd"/>
<stop offset="100%" stop-color="#bde0f5"/>
</linearGradient>
<linearGradient id="gCapN" x1="60" y1="0" x2="60" y2="28" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#1565c0"/>
<stop offset="100%" stop-color="#0d47a1"/>
</linearGradient>
<linearGradient id="gLabeN" x1="60" y1="120" x2="60" y2="220" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#f0f8ff"/>
</linearGradient>
<filter id="shadowN"><feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/></filter>
</defs>
<ellipse cx="60" cy="308" rx="32" ry="6" fill="#000" opacity="0.08"/>
<g filter="url(#shadowN)">
<path d="M42 52 C42 42 48 36 60 36 C72 36 78 42 78 52 L78 62 L42 62 Z" fill="url(#gBodyN)" stroke="#b0d4e8" stroke-width="1.5"/>
<rect x="38" y="62" width="44" height="228" rx="6" fill="url(#gBodyN)" stroke="#b0d4e8" stroke-width="1.5"/>
<path d="M38 270 Q38 290 60 290 Q82 290 82 270" fill="url(#gBodyN)" stroke="#b0d4e8" stroke-width="1.5"/>
<rect x="44" y="36" width="32" height="28" rx="3" fill="#bde4f4" opacity="0.3"/>
<path d="M48 20 L48 8 C48 3 52 0 60 0 C68 0 72 3 72 8 L72 20" fill="url(#gCapN)" stroke="#0d47a1" stroke-width="1"/>
<rect x="46" y="0" width="28" height="10" rx="3" fill="#1565c0"/>
<rect x="44" y="5" width="32" height="3" rx="1" fill="#42a5f5" opacity="0.4"/>
<rect x="36" y="130" width="48" height="70" rx="4" fill="url(#gLabeN)" stroke="#c5dbe8" stroke-width="1"/>
<path d="M48 142 C52 138 56 136 60 136 C64 136 68 138 72 142" fill="none" stroke="#2196f3" stroke-width="1.5"/>
<ellipse cx="60" cy="148" rx="8" ry="8" fill="none" stroke="#2196f3" stroke-width="1"/>
<text x="60" y="168" text-anchor="middle" font-size="7" fill="#1a5276" font-weight="800" font-family="Arial">SAN BENEDETTO</text>
<text x="60" y="180" text-anchor="middle" font-size="5.5" fill="#2e86c1" font-family="Arial">Acqua Minerale</text>
<text x="60" y="190" text-anchor="middle" font-size="5" fill="#5dade2" font-family="Arial">Naturale</text>
<rect x="36" y="210" width="48" height="3" rx="1" fill="#5dade2" opacity="0.3"/>
</g>
</svg>
</div>
<div class="count-section">
<div class="totale-label">TOTALE OGGI:</div>
<div class="count-number" id="c-naturale">0</div>
<div class="bottiglie-label">BOTTIGLIE</div>
</div>
<button class="add-button btn-naturale" data-key="naturale">CLICCA PER<br>AGGIUNGERE</button>
</div>

<div class="water-card card-frizzante">
<div class="card-title">Acqua Frizzante</div>
<div class="bottle-area">
<svg class="bottle-svg" viewBox="0 0 120 320" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="gBodyF" x1="60" y1="30" x2="60" y2="300" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#e3f2fd"/>
<stop offset="40%" stop-color="#bbdefb"/>
<stop offset="100%" stop-color="#90caf9"/>
</linearGradient>
<linearGradient id="gCapF" x1="60" y1="0" x2="60" y2="28" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#e53935"/>
<stop offset="100%" stop-color="#c62828"/>
</linearGradient>
<linearGradient id="gLabeF" x1="60" y1="120" x2="60" y2="220" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#f0f8ff"/>
</linearGradient>
<filter id="shadowF"><feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/></filter>
</defs>
<ellipse cx="60" cy="308" rx="32" ry="6" fill="#000" opacity="0.08"/>
<g filter="url(#shadowF)">
<path d="M42 52 C42 42 48 36 60 36 C72 36 78 42 78 52 L78 62 L42 62 Z" fill="url(#gBodyF)" stroke="#90caf9" stroke-width="1.5"/>
<rect x="38" y="62" width="44" height="228" rx="6" fill="url(#gBodyF)" stroke="#90caf9" stroke-width="1.5"/>
<path d="M38 270 Q38 290 60 290 Q82 290 82 270" fill="url(#gBodyF)" stroke="#90caf9" stroke-width="1.5"/>
<rect x="44" y="36" width="32" height="28" rx="3" fill="#90caf9" opacity="0.3"/>
<path d="M48 20 L48 8 C48 3 52 0 60 0 C68 0 72 3 72 8 L72 20" fill="url(#gCapF)" stroke="#c62828" stroke-width="1"/>
<rect x="46" y="0" width="28" height="10" rx="3" fill="#e53935"/>
<rect x="44" y="5" width="32" height="3" rx="1" fill="#ef9a9a" opacity="0.4"/>
<circle cx="50" cy="100" r="4" fill="white" opacity="0.35"/>
<circle cx="70" cy="130" r="3" fill="white" opacity="0.3"/>
<circle cx="45" cy="170" r="5" fill="white" opacity="0.35"/>
<circle cx="65" cy="200" r="3" fill="white" opacity="0.3"/>
<circle cx="50" cy="240" r="4" fill="white" opacity="0.35"/>
<circle cx="72" cy="260" r="2.5" fill="white" opacity="0.3"/>
<rect x="36" y="130" width="48" height="70" rx="4" fill="url(#gLabeF)" stroke="#b0d4e8" stroke-width="1"/>
<path d="M48 142 C52 138 56 136 60 136 C64 136 68 138 72 142" fill="none" stroke="#2196f3" stroke-width="1.5"/>
<ellipse cx="60" cy="148" rx="8" ry="8" fill="none" stroke="#2196f3" stroke-width="1"/>
<text x="60" y="168" text-anchor="middle" font-size="7" fill="#1a5276" font-weight="800" font-family="Arial">SAN BENEDETTO</text>
<text x="60" y="180" text-anchor="middle" font-size="5.5" fill="#e74c3c" font-family="Arial">Acqua Minerale</text>
<text x="60" y="190" text-anchor="middle" font-size="5" fill="#ef5350" font-family="Arial">Frizzante</text>
<rect x="36" y="210" width="48" height="3" rx="1" fill="#ef5350" opacity="0.3"/>
</g>
</svg>
</div>
<div class="count-section">
<div class="totale-label">TOTALE OGGI:</div>
<div class="count-number" id="c-frizzante">0</div>
<div class="bottiglie-label">BOTTIGLIE</div>
</div>
<button class="add-button btn-frizzante" data-key="frizzante">CLICCA PER<br>AGGIUNGERE</button>
</div>

</div>

<script>
const data = {naturale:0, frizzante:0}
const key = 'acqua-counts'
const today = new Date().toDateString()
const savedDay = localStorage.getItem(key+'-day')

if (savedDay === today) {
const saved = localStorage.getItem(key)
if (saved) {
const p = JSON.parse(saved)
data.naturale = p.naturale ?? 0
data.frizzante = p.frizzante ?? 0
}
}

function save(){
localStorage.setItem(key, JSON.stringify(data))
localStorage.setItem(key+'-day', today)
}

function render(){
document.getElementById('c-naturale').textContent = data.naturale
document.getElementById('c-frizzante').textContent = data.frizzante
}

document.querySelectorAll('.add-button').forEach(el => {
el.addEventListener('click', () => {
const k = el.dataset.key
data[k]++
render()
save()
})
})

const now = new Date()
document.getElementById('day').textContent = now.getDate()
document.getElementById('month').textContent = now.getMonth() + 1
document.getElementById('year').textContent = now.getFullYear()

render()

let pressTimer = null
const trigger = document.getElementById('reset-trigger')
const overlay = document.getElementById('reset-overlay')

function startPress(e){
e.preventDefault()
pressTimer = setTimeout(() => {
overlay.classList.add('show')
}, 800)
}
function cancelPress(){
clearTimeout(pressTimer)
pressTimer = null
}

trigger.addEventListener('mousedown', startPress)
trigger.addEventListener('mouseup', cancelPress)
trigger.addEventListener('mouseleave', cancelPress)
trigger.addEventListener('touchstart', startPress, {passive:false})
trigger.addEventListener('touchend', cancelPress)
trigger.addEventListener('touchcancel', cancelPress)

document.getElementById('btn-confirm').addEventListener('click', () => {
data.naturale = 0
data.frizzante = 0
render()
save()
overlay.classList.remove('show')
})
document.getElementById('btn-cancel').addEventListener('click', () => {
overlay.classList.remove('show')
})
</script>

</body>
</html>
