<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PRESENZE v3.6</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }
h1 { font-size: 1.8rem; margin: 16px 0 8px; color: #00e676; text-transform: uppercase; letter-spacing: 2px; }
#camera { width: 100%; max-width: 500px; display: block; margin: 12px auto; border-radius: 12px; background: #1a1f2b; }
#risultatoCF { width: 100%; max-width: 500px; margin: 8px auto; padding: 12px; border-radius: 12px; background: #1a1f2b; font-size: 1.1rem; text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center; color: #888; }
#risultatoCF.ok { background: #003d1a; color: #00e676; font-size: 1.4rem; animation: flash 0.6s ease; }
#risultatoCF.err { background: #3d0000; color: #ff5252; }
@keyframes flash { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
#btn-ocr { padding: 14px 24px; background: #ffd740; color: #000; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 6px auto; width: 90%; max-width: 500px; display: block; }
#btn-ocr:active { opacity: 0.7; }
#counter { font-size: 1rem; color: #aaa; margin: 4px 0 12px; }
#oggi { background: #1a1f2b; border-radius: 12px; padding: 12px 16px; width: 100%; max-width: 500px; margin: 8px auto; }
#oggi h3 { color: #00e676; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#oggi div { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2f3b; font-size: 0.85rem; }
#oggi div span:first-child { color: #fff; font-weight: 600; }
#oggi div span:last-child { color: #aaa; }
#oggi .entrata { border-left: 3px solid #00e676; padding-left: 8px; }
#oggi .uscita { border-left: 3px solid #ff5252; padding-left: 8px; }
#stats { margin-top: 12px; width: 100%; max-width: 500px; }
#stats summary { cursor: pointer; color: #00e676; font-size: 0.9rem; padding: 8px; background: #1a1f2b; border-radius: 8px; text-align: center; }
#stats-content { margin-top: 8px; background: #1a1f2b; border-radius: 12px; padding: 12px; max-height: 300px; overflow-y: auto; font-size: 0.8rem; display: none; }
#stats-content.open { display: block; }
#stats-content table { width: 100%; border-collapse: collapse; }
#stats-content th { position: sticky; top: 0; background: #1a1f2b; color: #00e676; text-align: left; padding: 4px 6px; border-bottom: 2px solid #00e676; font-size: 0.75rem; text-transform: uppercase; }
#stats-content td { padding: 4px 6px; border-bottom: 1px solid #2a2f3b; }
#btn-reset { margin-top: 16px; padding: 8px 20px; background: #3d0000; color: #ff5252; border: 1px solid #ff5252; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
#btn-reset:hover { background: #5a0000; }
#manual-area { width: 100%; max-width: 500px; text-align: center; margin: 4px 0; }
#toggle-manuale { color: #888; font-size: 0.8rem; cursor: pointer; text-decoration: none; }
#toggle-manuale:hover { color: #00e676; }
#manual-input { margin-top: 6px; display: flex; gap: 6px; }
#cf-input { flex: 1; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #1a1f2b; color: #fff; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
#cf-input:focus { outline: none; border-color: #00e676; }
#btn-manuale { padding: 10px 16px; background: #00e676; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
#btn-manuale:active { opacity: 0.7; }
</style>
</head>
<body>

<h1>&#x23F3; PRESENZE <span style="font-size:0.7rem;color:#888;letter-spacing:0">v3.6</span></h1>
<div id="counter"></div>

<video id="camera" autoplay playsinline></video>
<canvas id="snapshot" style="display:none;"></canvas>

<button id="btn-ocr">&#x1F50D; Leggi CF dalla tessera</button>
<div id="risultatoCF">In attesa di una tessera...</div>

<div id="manual-area">
  <a id="toggle-manuale" href="#">Inserisci CF manualmente</a>
  <div id="manual-input" style="display:none">
    <input type="text" id="cf-input" maxlength="16" placeholder="Codice Fiscale" autocomplete="off">
    <button id="btn-manuale">Timbra</button>
  </div>
</div>

<div id="oggi"></div>

<details id="stats">
<summary>&#x1F4CB; Archivio timbrature</summary>
<div id="stats-content"></div>
</details>

<button id="btn-reset" style="display:none">&#x1F5D1; Reset dati</button>

<script>
const CF_STORAGE_KEY = 'timbra_cd_dati';
const VERSION = 'v3.6';

var lastCf = '';

function getDati() {
    try { return JSON.parse(localStorage.getItem(CF_STORAGE_KEY)) || {}; }
    catch { return {}; }
}

function salvaDati(dati) {
    localStorage.setItem(CF_STORAGE_KEY, JSON.stringify(dati));
}

function oggiStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function meseStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function oraStr() {
    var d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
}

function tipoTimbratura(dati, cf, giorno) {
    var timbrature = dati[cf]?.[meseStr()]?.[giorno] || [];
    var count = timbrature.length;
    if (count >= 6) return null;
    return count % 2 === 0 ? 'ENTRATA' : 'USCITA';
}

function registraTimbratura(cf) {
    var dati = getDati();
    var giorno = oggiStr();
    var mese = meseStr();

    if (!dati[cf]) dati[cf] = {};
    if (!dati[cf][mese]) dati[cf][mese] = {};
    if (!dati[cf][mese][giorno]) dati[cf][mese][giorno] = [];

    var tipo = tipoTimbratura(dati, cf, giorno);
    if (tipo === null) {
        document.getElementById('risultatoCF').textContent = 'Limite 6 timbrature raggiunto per oggi!';
        document.getElementById('risultatoCF').className = 'err';
        return;
    }

    dati[cf][mese][giorno].push({ ora: oraStr(), tipo: tipo });
    salvaDati(dati);
    document.getElementById('risultatoCF').innerHTML = 'TIMBRATO !!!';
    document.getElementById('risultatoCF').className = 'ok';
    aggiornaOggi(cf);
    aggiornaCounter(cf);
}

function aggiornaCounter(cf) {
    var dati = getDati();
    var timbrature = dati[cf]?.[meseStr()]?.[oggiStr()] || [];
    var prossimo = timbrature.length % 2 === 0 ? 'ENTRATA' : 'USCITA';
    var rimanenti = 6 - timbrature.length;
    document.getElementById('counter').textContent =
        (timbrature.length > 0 ? cf + ' - ' : '') +
        timbrature.length + '/6 timbrature oggi - Prossima: ' + prossimo +
        (rimanenti <= 0 ? ' (COMPLETATO)' : '');
}

function aggiornaOggi(cf) {
    var dati = getDati();
    var giorno = oggiStr();
    var mese = meseStr();
    var el = document.getElementById('oggi');
    var timbrature = dati[cf]?.[mese]?.[giorno] || [];

    if (timbrature.length === 0) {
        el.innerHTML = '<h3>&#x1F4C5; Oggi</h3><div style="color:#666;text-align:center;padding:12px">Nessuna timbratura</div>';
        return;
    }

    var html = '<h3>&#x1F4C5; Oggi - ' + cf + '</h3>';
    timbrature.forEach(function(t, i) {
        var cls = t.tipo === 'ENTRATA' ? 'entrata' : 'uscita';
        html += '<div class="' + cls + '"><span>' + (i + 1) + '. ' + t.tipo + '</span><span>' + t.ora + '</span></div>';
    });
    el.innerHTML = html;
}

function aggiornaArchivio() {
    var dati = getDati();
    var el = document.getElementById('stats-content');
    var cfs = Object.keys(dati);
    if (cfs.length === 0) {
        el.innerHTML = '<div style="color:#666;text-align:center;padding:12px">Nessun dato</div>';
        return;
    }

    var html = '';
    cfs.sort().forEach(function(cf) {
        html += '<h4 style="color:#00e676;margin:12px 0 4px">' + cf + '</h4>';
        html += '<table><tr><th>Giorno</th><th>Ora</th><th>Tipo</th></tr>';
        var mesi = Object.keys(dati[cf]).sort().reverse();
        mesi.forEach(function(mese) {
            var giorni = Object.keys(dati[cf][mese]).sort().reverse();
            giorni.forEach(function(g) {
                dati[cf][mese][g].forEach(function(t) {
                    html += '<tr><td>' + g.slice(5) + '</td><td>' + t.ora + '</td><td>' + t.tipo + '</td></tr>';
                });
            });
        });
        html += '</table>';
    });
    el.innerHTML = html;
}

function validaCF(cf) {
    return /^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$/.test(cf);
}

async function leggiCF() {
    var video = document.getElementById('camera');
    var canvas = document.getElementById('snapshot');
    var ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    var w = canvas.width * 0.8;
    var h = canvas.height * 0.3;
    var x = (canvas.width - w) / 2;
    var y = (canvas.height - h) / 2;

    var cropCanvas = document.createElement('canvas');
    var cropCtx = cropCanvas.getContext('2d');
    cropCanvas.width = w;
    cropCanvas.height = h;
    cropCtx.drawImage(canvas, x, y, w, h, 0, 0, w, h);

    var imgData = cropCanvas.toDataURL('image/png');

    document.getElementById('risultatoCF').textContent = 'Lettura in corso...';
    document.getElementById('risultatoCF').className = '';

    var risultato = await Tesseract.recognize(imgData, 'eng', {
        logger: function(m) { console.log(m); },
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
    });

    var testo = risultato.data.text.replace(/\s/g, '');
    var match = testo.match(/[A-Z0-9]{16}/);

    if (match) {
        var cf = match[0];
        document.getElementById('risultatoCF').innerHTML = 'Rilevato: <b>' + cf + '</b>';
        document.getElementById('risultatoCF').className = '';

        if (cf === lastCf) {
            document.getElementById('risultatoCF').textContent = 'Gia timbrato';
            document.getElementById('risultatoCF').className = 'err';
            return;
        }

        lastCf = cf;
        registraTimbratura(cf);
        aggiornaArchivio();
        setTimeout(function() { lastCf = ''; }, 2000);
    } else {
        var raw = risultato.data.text.replace(/\s+/g, ' ').trim();
        document.getElementById('risultatoCF').innerHTML = 'Nessun CF trovato. "' + raw.substr(0, 40) + '"';
        document.getElementById('risultatoCF').className = 'err';
    }
}

document.getElementById('btn-ocr').addEventListener('click', leggiCF);

document.getElementById('stats').addEventListener('toggle', function() {
    var content = document.getElementById('stats-content');
    content.classList.toggle('open', this.open);
    if (this.open) aggiornaArchivio();
});

document.getElementById('btn-reset').addEventListener('click', function() {
    if (confirm('Cancellare TUTTI i dati di timbratura?')) {
        localStorage.removeItem(CF_STORAGE_KEY);
        location.reload();
    }
});

document.getElementById('toggle-manuale').addEventListener('click', function(e) {
    e.preventDefault();
    var div = document.getElementById('manual-input');
    div.style.display = div.style.display === 'none' ? 'flex' : 'none';
    if (div.style.display === 'flex') document.getElementById('cf-input').focus();
});

document.getElementById('btn-manuale').addEventListener('click', function() {
    var cf = document.getElementById('cf-input').value.toUpperCase().trim();
    if (!cf) return;
    if (!validaCF(cf)) {
        document.getElementById('risultatoCF').textContent = 'Codice non valido';
        document.getElementById('risultatoCF').className = 'err';
        return;
    }
    registraTimbratura(cf);
    aggiornaArchivio();
    document.getElementById('cf-input').value = '';
    document.getElementById('manual-input').style.display = 'none';
});

document.getElementById('cf-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btn-manuale').click();
});

navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
  .then(function(stream) {
    document.getElementById('camera').srcObject = stream;
  })
  .catch(function(err) {
    document.getElementById('risultatoCF').textContent = 'Errore fotocamera: ' + err;
    document.getElementById('risultatoCF').className = 'err';
  });

window.addEventListener('load', function() {
    var dati = getDati();
    if (Object.keys(dati).length > 0) {
        document.getElementById('btn-reset').style.display = '';
        var cfs = Object.keys(dati);
        aggiornaOggi(cfs[0]);
        aggiornaCounter(cfs[0]);
    }
});
</script>
</body>
</html>
